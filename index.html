<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oakland Walking Tour</title>
</head>
<body>
    <script>
        // List of available tour files
        const tourFiles = [
            'oakland-tour (4).html',
            'oakland-tour (6).html',
            'oakland-tour (9).html'
        ];
        
        // Extract numbers and find the highest
        const highestFile = tourFiles.reduce((max, file) => {
            const match = file.match(/\((\d+)\)/);
            const currentNum = match ? parseInt(match[1]) : 0;
            const maxMatch = max.match(/\((\d+)\)/);
            const maxNum = maxMatch ? parseInt(maxMatch[1]) : 0;
            return currentNum > maxNum ? file : max;
        });
        
        // Redirect to highest numbered file
        window.location.href = highestFile;
    </script>
</body>
</html>
